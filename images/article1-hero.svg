<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="background:#09090f">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur16"><feGaussianBlur stdDeviation="16"/></filter>
    <marker id="arrowC" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00e5ff" opacity="0.8"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background glow pools -->
  <ellipse cx="600" cy="315" rx="420" ry="260" fill="url(#glow1)"/>
  <ellipse cx="300" cy="200" rx="200" ry="160" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Central cycle: three nodes -->
  <!-- PERCEIVE node -->
  <circle cx="600" cy="170" r="62" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="600" cy="170" r="56" fill="#0a0f1a" stroke="#00e5ff" stroke-width="2" opacity="0.9"/>
  <circle cx="600" cy="170" r="56" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.6" filter="url(#blur4)"/>
  <text x="600" y="164" text-anchor="middle" font-family="monospace" font-size="10" fill="#00e5ff" opacity="0.5" letter-spacing="3">●●●</text>
  <text x="600" y="182" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00e5ff" font-weight="bold" letter-spacing="1">PERCEIVE</text>

  <!-- DECIDE node -->
  <circle cx="430" cy="430" r="62" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <circle cx="430" cy="430" r="56" fill="#0a0f1a" stroke="#7c3aed" stroke-width="2" opacity="0.9"/>
  <circle cx="430" cy="430" r="56" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6" filter="url(#blur4)"/>
  <text x="430" y="424" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.5" letter-spacing="3">◆◆◆</text>
  <text x="430" y="442" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold" letter-spacing="1">DECIDE</text>

  <!-- ACT node -->
  <circle cx="770" cy="430" r="62" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  <circle cx="770" cy="430" r="56" fill="#0a0f1a" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
  <circle cx="770" cy="430" r="56" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6" filter="url(#blur4)"/>
  <text x="770" y="424" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b" opacity="0.5" letter-spacing="3">▶▶▶</text>
  <text x="770" y="442" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#f59e0b" font-weight="bold" letter-spacing="1">ACT</text>

  <!-- Connecting arcs: PERCEIVE → DECIDE -->
  <path d="M 554 202 Q 390 290 474 380" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowC)" stroke-dasharray="4 3"/>
  <!-- DECIDE → ACT -->
  <path d="M 490 430 L 710 430" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowV)" stroke-dasharray="4 3"/>
  <!-- ACT → PERCEIVE -->
  <path d="M 726 398 Q 800 290 656 202" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowV)" stroke-dasharray="4 3"/>

  <!-- Glowing connection glow lines -->
  <path d="M 554 202 Q 390 290 474 380" stroke="#00e5ff" stroke-width="4" fill="none" opacity="0.08" filter="url(#blur4)"/>
  <path d="M 490 430 L 710 430" stroke="#7c3aed" stroke-width="4" fill="none" opacity="0.08" filter="url(#blur4)"/>
  <path d="M 726 398 Q 800 290 656 202" stroke="#f59e0b" stroke-width="4" fill="none" opacity="0.08" filter="url(#blur4)"/>

  <!-- Center point -->
  <circle cx="600" cy="330" r="6" fill="#00e5ff" opacity="0.6" filter="url(#blur4)"/>
  <circle cx="600" cy="330" r="3" fill="#00e5ff" opacity="0.9"/>

  <!-- Small data packets on the arrows (decorative dots) -->
  <circle cx="492" cy="274" r="3" fill="#00e5ff" opacity="0.7"/>
  <circle cx="600" cy="430" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="700" cy="310" r="3" fill="#f59e0b" opacity="0.7"/>

  <!-- Left panel: code snippet -->
  <rect x="60" y="180" width="280" height="210" rx="6" fill="#0a0f1a" stroke="#1a2540" stroke-width="1" opacity="0.9"/>
  <rect x="60" y="180" width="280" height="26" rx="6" fill="#0f1628"/>
  <circle cx="80" cy="193" r="4" fill="#ff5f57" opacity="0.8"/>
  <circle cx="96" cy="193" r="4" fill="#ffbd2e" opacity="0.8"/>
  <circle cx="112" cy="193" r="4" fill="#28ca41" opacity="0.8"/>
  <text x="180" y="197" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a5568">agent.py</text>

  <text x="80" y="228" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed" opacity="0.9">while</text>
  <text x="116" y="228" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.7">True:</text>
  <text x="88" y="248" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" opacity="0.8">response</text>
  <text x="157" y="248" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.5">= api(</text>
  <text x="88" y="266" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.4">  messages</text>
  <text x="88" y="284" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed" opacity="0.9">  if</text>
  <text x="112" y="284" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.6">stop_reason:</text>
  <text x="104" y="302" font-family="'Courier New', monospace" font-size="10" fill="#28ca41" opacity="0.8">return</text>
  <text x="150" y="302" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.4">result</text>
  <text x="88" y="320" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" opacity="0.8">dispatch</text>
  <text x="150" y="320" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.4">(tools)</text>
  <text x="88" y="338" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.3">messages.append(</text>
  <text x="88" y="356" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0" opacity="0.3">  result)</text>

  <!-- Right panel: metrics/stats -->
  <rect x="860" y="180" width="280" height="210" rx="6" fill="#0a0f1a" stroke="#1a2540" stroke-width="1" opacity="0.9"/>
  <text x="1000" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#4a5568" letter-spacing="2">HARNESS METRICS</text>

  <!-- Stat bars -->
  <rect x="888" y="230" width="50" height="6" rx="3" fill="#1a2540"/>
  <rect x="888" y="230" width="45" height="6" rx="3" fill="#00e5ff" opacity="0.7"/>
  <text x="948" y="238" font-family="monospace" font-size="9" fill="#00e5ff" opacity="0.6">tools dispatched</text>

  <rect x="888" y="252" width="50" height="6" rx="3" fill="#1a2540"/>
  <rect x="888" y="252" width="38" height="6" rx="3" fill="#7c3aed" opacity="0.7"/>
  <text x="948" y="260" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.6">context managed</text>

  <rect x="888" y="274" width="50" height="6" rx="3" fill="#1a2540"/>
  <rect x="888" y="274" width="48" height="6" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="948" y="282" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.6">permissions gov.</text>

  <rect x="888" y="296" width="50" height="6" rx="3" fill="#1a2540"/>
  <rect x="888" y="296" width="42" height="6" rx="3" fill="#28ca41" opacity="0.7"/>
  <text x="948" y="304" font-family="monospace" font-size="9" fill="#28ca41" opacity="0.6">tasks completed</text>

  <!-- Divider -->
  <line x1="888" y1="320" x2="1120" y2="320" stroke="#1a2540" stroke-width="1"/>
  <text x="888" y="342" font-family="monospace" font-size="9" fill="#4a5568">loop.iterations</text>
  <text x="1090" y="342" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" opacity="0.8">∞</text>

  <text x="888" y="362" font-family="monospace" font-size="9" fill="#4a5568">stop_reason</text>
  <text x="1090" y="362" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#28ca41" opacity="0.8">end_turn</text>

  <!-- Title area -->
  <line x1="60" y1="556" x2="1140" y2="556" stroke="#1a2540" stroke-width="1"/>
  <text x="60" y="590" font-family="'Courier New', monospace" font-size="28" fill="#ffffff" opacity="0.9" font-weight="bold" letter-spacing="-0.5">The 4-Line Loop That Powers Claude Code</text>
  <text x="60" y="614" font-family="monospace" font-size="11" fill="#4a6080" letter-spacing="2">PHASE 1 · CORE AGENT LOOP · HARNESS ENGINEERING</text>

  <!-- Top decoration: binary noise -->
  <text x="60" y="50" font-family="monospace" font-size="8" fill="#1a2540" letter-spacing="2">01001000 01000001 01010010 01001110 01000101 01010011 01010011</text>
  <text x="60" y="65" font-family="monospace" font-size="8" fill="#1a2540" letter-spacing="2">10010001 00101100 11010010 01001011 10110100 10010110 01001101</text>
  <text x="60" y="80" font-family="monospace" font-size="8" fill="#1a2540" letter-spacing="2">00110100 10010010 01101001 10100010 00100101 01001001 00100100</text>

  <!-- Corner accent lines -->
  <line x1="60" y1="100" x2="60" y2="140" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="100" x2="160" y2="100" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
  <line x1="1140" y1="100" x2="1140" y2="140" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
  <line x1="1040" y1="100" x2="1140" y2="100" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
</svg>
