<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="background:#09090f">
  <defs>
    <radialGradient id="gE" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#28ca41" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gRedis" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf5"><feGaussianBlur stdDeviation="4"/></filter>
    <marker id="arrowG" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#28ca41" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#09090f"/>
  <ellipse cx="600" cy="260" rx="500" ry="220" fill="url(#gE)"/>

  <!-- Redis central node -->
  <ellipse cx="600" cy="240" rx="70" ry="55" fill="url(#gRedis)"/>
  <ellipse cx="600" cy="240" rx="58" ry="46" fill="#0a0f1a" stroke="#ff4444" stroke-width="2" opacity="0.9"/>
  <text x="600" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff4444" opacity="0.9" font-weight="bold">REDIS</text>
  <text x="600" y="248" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#ff4444" opacity="0.5">STREAMS</text>
  <text x="600" y="262" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a5568">pub/sub</text>

  <!-- Machine 1 agents: 3 agents on server A -->
  <rect x="60" y="90" width="280" height="110" rx="8" fill="#0a0f1a" stroke="#2a3a2a" stroke-width="1.5"/>
  <text x="200" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">SERVER A</text>
  <rect x="75" y="120" width="240" height="22" rx="4" fill="#09090f" stroke="#28ca41" stroke-width="1" opacity="0.6"/>
  <text x="195" y="135" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#28ca41" opacity="0.7">agent: code-writer-1</text>
  <rect x="75" y="148" width="240" height="22" rx="4" fill="#09090f" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="195" y="163" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#7c3aed" opacity="0.7">agent: code-writer-2</text>
  <rect x="75" y="176" width="240" height="22" rx="4" fill="#09090f" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <text x="195" y="191" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00e5ff" opacity="0.7">agent: reviewer-1</text>

  <!-- Machine 2 agents: server B -->
  <rect x="860" y="90" width="280" height="110" rx="8" fill="#0a0f1a" stroke="#2a3a2a" stroke-width="1.5"/>
  <text x="1000" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">SERVER B</text>
  <rect x="875" y="120" width="240" height="22" rx="4" fill="#09090f" stroke="#28ca41" stroke-width="1" opacity="0.6"/>
  <text x="995" y="135" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#28ca41" opacity="0.7">agent: tester-1</text>
  <rect x="875" y="148" width="240" height="22" rx="4" fill="#09090f" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="995" y="163" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#f59e0b" opacity="0.7">agent: tester-2</text>
  <rect x="875" y="176" width="240" height="22" rx="4" fill="#09090f" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <text x="995" y="191" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00e5ff" opacity="0.7">agent: doc-writer-1</text>

  <!-- Server C below -->
  <rect x="460" y="350" width="280" height="88" rx="8" fill="#0a0f1a" stroke="#2a3a2a" stroke-width="1.5"/>
  <text x="600" y="370" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">SERVER C</text>
  <rect x="475" y="380" width="240" height="22" rx="4" fill="#09090f" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="595" y="395" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#7c3aed" opacity="0.7">agent: security-auditor-1</text>
  <rect x="475" y="408" width="240" height="22" rx="4" fill="#09090f" stroke="#28ca41" stroke-width="1" opacity="0.5"/>
  <text x="595" y="423" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#28ca41" opacity="0.5">agent: code-writer-3</text>

  <!-- Connections to Redis -->
  <line x1="340" y1="150" x2="542" y2="220" stroke="#28ca41" stroke-width="1.2" opacity="0.4" marker-end="url(#arrowG)" stroke-dasharray="5 3"/>
  <line x1="860" y1="150" x2="658" y2="220" stroke="#28ca41" stroke-width="1.2" opacity="0.4" marker-end="url(#arrowG)" stroke-dasharray="5 3"/>
  <line x1="600" y1="350" x2="600" y2="286" stroke="#28ca41" stroke-width="1.2" opacity="0.4" marker-end="url(#arrowG)" stroke-dasharray="5 3"/>

  <!-- Git worktree section at bottom right -->
  <rect x="60" y="440" width="480" height="100" rx="8" fill="#0a0f1a" stroke="#1a2540" stroke-width="1.5"/>
  <text x="80" y="460" font-family="monospace" font-size="8.5" fill="#4a6080" letter-spacing="2">GIT WORKTREE LIFECYCLE</text>
  <text x="80" y="480" font-family="'Courier New', monospace" font-size="8" fill="#e2e8f0" opacity="0.4">agent/task-001  →  ACTIVE   →  IDLE   →  MERGED   →  PRUNED</text>
  <text x="80" y="498" font-family="'Courier New', monospace" font-size="8" fill="#e2e8f0" opacity="0.4">agent/task-002  →  ACTIVE   →  CONFLICT → (manual resolution)</text>
  <text x="80" y="516" font-family="'Courier New', monospace" font-size="8" fill="#e2e8f0" opacity="0.3">agent/task-003  →  ABANDONED  (24h idle → auto-pruned)</text>
  <text x="80" y="530" font-family="'Courier New', monospace" font-size="8" fill="#28ca41" opacity="0.5">prune_abandoned(max_idle_hours=24)  →  3 branches cleaned</text>

  <!-- Scale numbers -->
  <rect x="700" y="440" width="440" height="100" rx="8" fill="#0a0f1a" stroke="#1a2540" stroke-width="1.5"/>
  <text x="720" y="460" font-family="monospace" font-size="8.5" fill="#4a6080" letter-spacing="2">SCALE</text>
  <text x="720" y="480" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.7">6 agents</text>
  <text x="800" y="480" font-family="monospace" font-size="9" fill="#4a5568">× 3 servers</text>
  <text x="720" y="500" font-family="monospace" font-size="9" fill="#00e5ff" opacity="0.7">~200 tasks/hr</text>
  <text x="720" y="520" font-family="monospace" font-size="9" fill="#28ca41" opacity="0.6">exactly-once delivery</text>
  <text x="720" y="536" font-family="monospace" font-size="9" fill="#28ca41" opacity="0.5">ack on success, retry on fail</text>

  <!-- Title -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#1a2540" stroke-width="1"/>
  <text x="60" y="608" font-family="'Courier New', monospace" font-size="22" fill="#ffffff" opacity="0.9" font-weight="bold">Enterprise-Grade AI Agents</text>
  <text x="60" y="624" font-family="monospace" font-size="10" fill="#4a6080" letter-spacing="2">PHASE 6 · REDIS PUB/SUB · WORKTREE LIFECYCLE · 23 PATTERNS COMPLETE</text>
</svg>
