<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" style="background:#09090f">
  <rect width="900" height="380" fill="#09090f"/>

  <text x="450" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b" opacity="0.7" letter-spacing="3">PROMPT CACHE PERFORMANCE</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#1a2540" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="38" y="200" text-anchor="middle" transform="rotate(-90 38 200)" font-family="monospace" font-size="8" fill="#4a5568">cost per call</text>

  <!-- Bars for 6 calls -->
  <!-- Call 1: cold -->
  <rect x="120" y="90" width="60" height="200" rx="3" fill="#ff4444" opacity="0.5"/>
  <text x="150" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4444" opacity="0.6">$0.030</text>
  <text x="150" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 1</text>
  <text x="150" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a5568">cold</text>
  <text x="150" y="332" text-anchor="middle" font-family="monospace" font-size="7" fill="#ff4444" opacity="0.5">cache write</text>

  <!-- Calls 2-6: warm cache -->
  <rect x="220" y="270" width="60" height="20" rx="3" fill="#28ca41" opacity="0.8"/>
  <text x="250" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#28ca41" opacity="0.8">$0.003</text>
  <text x="250" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 2</text>
  <text x="250" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#28ca41" opacity="0.6">cache hit</text>

  <rect x="320" y="270" width="60" height="20" rx="3" fill="#28ca41" opacity="0.8"/>
  <text x="350" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#28ca41" opacity="0.8">$0.003</text>
  <text x="350" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 3</text>
  <text x="350" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#28ca41" opacity="0.6">cache hit</text>

  <rect x="420" y="270" width="60" height="20" rx="3" fill="#28ca41" opacity="0.8"/>
  <text x="450" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#28ca41" opacity="0.8">$0.003</text>
  <text x="450" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 4</text>
  <text x="450" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#28ca41" opacity="0.6">cache hit</text>

  <rect x="520" y="270" width="60" height="20" rx="3" fill="#28ca41" opacity="0.8"/>
  <text x="550" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#28ca41" opacity="0.8">$0.003</text>
  <text x="550" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 5</text>
  <text x="550" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#28ca41" opacity="0.6">cache hit</text>

  <rect x="620" y="270" width="60" height="20" rx="3" fill="#28ca41" opacity="0.8"/>
  <text x="650" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#28ca41" opacity="0.8">$0.003</text>
  <text x="650" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a5568">Call 6</text>
  <text x="650" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#28ca41" opacity="0.6">cache hit</text>

  <!-- X axis -->
  <line x1="100" y1="290" x2="820" y2="290" stroke="#2a3a2a" stroke-width="1.5"/>
  <line x1="100" y1="90" x2="100" y2="290" stroke="#2a3a2a" stroke-width="1"/>

  <!-- Baseline marker -->
  <line x1="100" y1="290" x2="820" y2="290" stroke="#4a5568" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Summary box -->
  <rect x="730" y="90" width="160" height="110" rx="6" fill="#0a1020" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="810" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6">SAVINGS</text>
  <text x="750" y="132" font-family="monospace" font-size="8" fill="#4a5568">Without cache:</text>
  <text x="872" y="132" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#ff4444" opacity="0.7">$0.180</text>
  <text x="750" y="150" font-family="monospace" font-size="8" fill="#4a5568">With cache:</text>
  <text x="872" y="150" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#28ca41" opacity="0.8">$0.045</text>
  <line x1="750" y1="158" x2="875" y2="158" stroke="#2a3a2a" stroke-width="1"/>
  <text x="750" y="173" font-family="monospace" font-size="8" fill="#4a5568">Saved:</text>
  <text x="872" y="173" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" opacity="0.9">$0.135</text>
  <text x="810" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b" opacity="0.9">75% cheaper</text>
</svg>
