<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="background:#09090f">
  <defs>
    <radialGradient id="gLeft" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gRight" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf4"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="#09090f"/>
  <ellipse cx="300" cy="315" rx="320" ry="280" fill="url(#gLeft)"/>
  <ellipse cx="900" cy="315" rx="320" ry="280" fill="url(#gRight)"/>

  <!-- Divider line -->
  <line x1="600" y1="80" x2="600" y2="540" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#3a3a4a" letter-spacing="3">VS</text>

  <!-- LEFT: PROTOTYPE -->
  <text x="300" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff4444" opacity="0.7" letter-spacing="4">PROTOTYPE</text>

  <!-- Silent blocking indicator -->
  <rect x="90" y="145" width="420" height="60" rx="6" fill="#0a0f1a" stroke="#3a1a1a" stroke-width="1.5"/>
  <rect x="110" y="160" width="100" height="30" rx="4" fill="#1a0a0a" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
  <text x="160" y="179" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4444" opacity="0.5">API CALL</text>
  <!-- Long waiting block -->
  <rect x="220" y="163" width="270" height="24" rx="4" fill="#1a0a0a"/>
  <text x="355" y="179" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a3030">waiting... 45 seconds of silence</text>

  <!-- No streaming indicator -->
  <rect x="90" y="220" width="420" height="40" rx="6" fill="#0a0f1a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="300" y="245" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a3030">no output until complete</text>

  <!-- File write crashes -->
  <rect x="90" y="275" width="200" height="50" rx="6" fill="#0a0f1a" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <text x="190" y="295" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4444" opacity="0.6">write_file()</text>
  <text x="190" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4444" opacity="0.4">← no backup</text>

  <!-- Permission is hard-coded -->
  <rect x="310" y="275" width="200" height="50" rx="6" fill="#0a0f1a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="410" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a3030">if tool == 'rm':</text>
  <text x="410" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a3030">  return False  # 💀</text>

  <!-- Crash = lost state -->
  <rect x="90" y="340" width="420" height="50" rx="6" fill="#1a0a0a" stroke="#ff4444" stroke-width="1.5" opacity="0.6"/>
  <text x="300" y="360" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444" opacity="0.6">Process killed.</text>
  <text x="300" y="377" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a3030">All session state lost.</text>

  <!-- RIGHT: PRODUCTION -->
  <text x="900" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#00e5ff" opacity="0.7" letter-spacing="4">PRODUCTION</text>

  <!-- Streaming tokens live -->
  <rect x="690" y="145" width="420" height="60" rx="6" fill="#0a0f1a" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <text x="706" y="163" font-family="monospace" font-size="8" fill="#00e5ff" opacity="0.5">streaming live →</text>
  <text x="706" y="178" font-family="'Courier New', monospace" font-size="8.5" fill="#e2e8f0" opacity="0.6">I will read the file first, then</text>
  <text x="706" y="193" font-family="'Courier New', monospace" font-size="8.5" fill="#e2e8f0" opacity="0.4">analyze the auth logic...</text>
  <!-- Blinking cursor -->
  <rect x="866" y="185" width="6" height="11" rx="1" fill="#00e5ff" opacity="0.8"/>

  <!-- Snapshot before write -->
  <rect x="690" y="220" width="200" height="65" rx="6" fill="#0a0f1a" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <text x="790" y="238" text-anchor="middle" font-family="monospace" font-size="8" fill="#00e5ff" opacity="0.6">safe_write()</text>
  <text x="706" y="254" font-family="monospace" font-size="7.5" fill="#4a6080">1. snapshot_before_write()</text>
  <text x="706" y="268" font-family="monospace" font-size="7.5" fill="#4a6080">2. write new content</text>
  <text x="706" y="280" font-family="monospace" font-size="7.5" fill="#28ca41" opacity="0.6">← reversible ✓</text>

  <!-- YAML permissions -->
  <rect x="910" y="220" width="200" height="65" rx="6" fill="#0a0f1a" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <text x="1010" y="238" text-anchor="middle" font-family="monospace" font-size="8" fill="#7c3aed" opacity="0.6">permissions.yaml</text>
  <text x="926" y="254" font-family="monospace" font-size="7.5" fill="#4a6080">- tool: run_shell</text>
  <text x="926" y="268" font-family="monospace" font-size="7.5" fill="#4a6080">  pattern: "rm.*prod"</text>
  <text x="926" y="280" font-family="monospace" font-size="7.5" fill="#f59e0b" opacity="0.6">  action: deny</text>

  <!-- Session persistence -->
  <rect x="690" y="300" width="420" height="50" rx="6" fill="#0a1020" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <text x="900" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#00e5ff" opacity="0.5">session_store.save()</text>
  <text x="706" y="336" font-family="monospace" font-size="8" fill="#4a6080">.sessions/task-2847/state_20260530_143022.json</text>

  <!-- Event bus -->
  <rect x="690" y="365" width="420" height="55" rx="6" fill="#0a0f1a" stroke="#1a2540" stroke-width="1"/>
  <text x="706" y="382" font-family="monospace" font-size="8" fill="#4a6080">EVENT BUS</text>
  <text x="706" y="397" font-family="'Courier New', monospace" font-size="7.5" fill="#4a5568">[142ms] write_file → src/auth.py (1.2KB)</text>
  <text x="706" y="410" font-family="'Courier New', monospace" font-size="7.5" fill="#4a5568">[SLOW 6200ms] run_shell → npm test</text>

  <!-- Summary labels -->
  <text x="90" y="430" font-family="monospace" font-size="9" fill="#ff4444" opacity="0.5">✗ blocking · ✗ irreversible · ✗ no audit</text>
  <text x="690" y="430" font-family="monospace" font-size="9" fill="#00e5ff" opacity="0.5">✓ streaming · ✓ snapshots · ✓ governed · ✓ durable</text>

  <!-- Title -->
  <line x1="60" y1="555" x2="1140" y2="555" stroke="#1a2540" stroke-width="1"/>
  <text x="60" y="590" font-family="'Courier New', monospace" font-size="24" fill="#ffffff" opacity="0.9" font-weight="bold">From Prototype to Production</text>
  <text x="60" y="614" font-family="monospace" font-size="11" fill="#4a6080" letter-spacing="2">PHASE 4 · PRODUCTION HARDENING · 5 SAFETY PATTERNS</text>
</svg>
