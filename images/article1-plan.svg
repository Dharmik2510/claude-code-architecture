<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" style="background:#09090f">
  <defs>
    <radialGradient id="gP1" cx="25%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gP2" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="420" fill="#09090f"/>
  <ellipse cx="250" cy="210" rx="280" ry="200" fill="url(#gP1)"/>
  <ellipse cx="750" cy="210" rx="280" ry="200" fill="url(#gP2)"/>

  <text x="250" y="50" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff4444" opacity="0.7" letter-spacing="3">NO PLAN</text>
  <text x="750" y="50" text-anchor="middle" font-family="monospace" font-size="10" fill="#00e5ff" opacity="0.7" letter-spacing="3">WITH TODOWRITE</text>
  <line x1="500" y1="30" x2="500" y2="390" stroke="#2a2a3a" stroke-width="1.5"/>

  <!-- NO PLAN: chaotic execution -->
  <rect x="60" y="70" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="87" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.5">Turn 1: reads wrong file first</text>
  <rect x="60" y="104" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="121" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.5">Turn 2: runs tests before writing code</text>
  <rect x="60" y="138" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="155" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.4">Turn 3: realizes missing step → backtracks</text>
  <rect x="60" y="172" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="189" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.4">Turn 4: repeats work from Turn 1</text>
  <rect x="60" y="206" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="223" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.4">Turn 5: writes file incorrectly</text>
  <rect x="60" y="240" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="257" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.3">Turn 6: overwrites with same mistake</text>
  <rect x="60" y="274" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="291" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.3">Turn 7: discovers missing dep</text>
  <rect x="60" y="308" width="360" height="26" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="325" font-family="monospace" font-size="8.5" fill="#ff4444" opacity="0.3">Turn 8: installs dep, reruns</text>
  <text x="240" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444" opacity="0.5">8 turns · 3 backtracks · task incomplete</text>

  <!-- WITH PLAN: clean execution -->
  <rect x="540" y="70" width="400" height="26" rx="4" fill="#0f1020" stroke="#7c3aed" stroke-width="1.5" opacity="0.8"/>
  <text x="558" y="87" font-family="'Courier New', monospace" font-size="8.5" fill="#7c3aed" opacity="0.8">todo_write([step1…step5])</text>

  <rect x="540" y="104" width="400" height="26" rx="4" fill="#0a1020" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <text x="558" y="121" font-family="monospace" font-size="8.5" fill="#00e5ff" opacity="0.7">✓ Turn 2: list_directory → find files</text>

  <rect x="540" y="138" width="400" height="26" rx="4" fill="#0a1020" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <text x="558" y="155" font-family="monospace" font-size="8.5" fill="#00e5ff" opacity="0.7">✓ Turn 3: read_file(target.py)</text>

  <rect x="540" y="172" width="400" height="26" rx="4" fill="#0a1020" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <text x="558" y="189" font-family="monospace" font-size="8.5" fill="#00e5ff" opacity="0.7">✓ Turn 4: install deps, write code</text>

  <rect x="540" y="206" width="400" height="26" rx="4" fill="#0a1020" stroke="#28ca41" stroke-width="1.5" opacity="0.8"/>
  <text x="558" y="223" font-family="monospace" font-size="8.5" fill="#28ca41" opacity="0.8">✓ Turn 5: run_shell(pytest) → pass</text>

  <text x="740" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e5ff" opacity="0.6">5 turns · 0 backtracks · task complete</text>
  <text x="740" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="#28ca41" opacity="0.7">37% fewer turns · 100% success</text>
</svg>
